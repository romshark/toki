version: '3'

vars:
  TOKI_CMD: toki
  DEFAULT_LOCALE: en
  BUNDLE_DIR: tokibundle

tasks:
  default:
    desc: Show available tasks
    cmds:
      - echo "USER_WORKING_DIR {{.USER_WORKING_DIR}}"
      - echo "ROOT_TASKFILE {{.ROOT_TASKFILE}}"
      - task --list-all
    silent: true

  install:
    desc: Install toki from source to go bin
    cmds:
      - go install -v ./...
  install:del:
    desc: Deletes toki from go bin
    cmds:
      - rm -f $(go env GOPATH)/bin/toki

  init:
    desc: Initialize a new project with Toki
    summary: |
      Initialize a new Go project with Toki internationalization support.
      Creates the default bundle with English locale.
      Copies template files and sets up initial structure.
    vars:
      LOCALE: "{{.LOCALE | default .DEFAULT_LOCALE}}"
      MODULE_NAME: "{{.MODULE_NAME | default (printf \"github.com/username/project\")}}"
    dep: install
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - cp {{.ROOT_TASKFILE}}/template/main.go.template ./main.go
      - cp {{.ROOT_TASKFILE}}/template/go.mod.template ./go.mod
      - go run {{.ROOT_TASKFILE}}/template/replace.go MODULE_NAME_PLACEHOLDER {{.MODULE_NAME}} go.mod
      - go run {{.ROOT_TASKFILE}}/template/replace.go MODULE_NAME_PLACEHOLDER {{.MODULE_NAME}} main.go
      - go mod tidy
      - "{{.TOKI_CMD}} generate -l {{.LOCALE}} -json -v"
      - echo "✅ Project initialized with locale {{.LOCALE}}"
      - echo "📁 Bundle created in {{.BUNDLE_DIR}}"
      - echo "📝 Module {{.MODULE_NAME}}"

  init:del:
    desc: Delete Toki initialization (clean bundle)
    summary: |
      Removes all Toki bundle files and cleans the project.
      Use this to reset the project to a clean state.
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - rm -rf {{.BUNDLE_DIR}}
      - echo "🧹 Toki bundle removed"

  generate:
    desc: "Regenerate the localization bundle"
    summary: |
      Regenerates the localization bundle from source code.
      Use after adding new TIK strings to your code.
    dep: install
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - "{{.TOKI_CMD}} generate -l {{.DEFAULT_LOCALE}} -json"
      - echo "✅ Bundle regenerated"

  locale:add:
    desc: Add a new translation locale
    summary: |
      Add support for a new language/locale.
      Creates new .arb files for the specified locale.
    dep: install
    dir: "{{.USER_WORKING_DIR}}"
    requires:
      vars: [LOCALE]
    cmds:
      - "{{.TOKI_CMD}} generate -t {{.LOCALE}} -json -v"
      - echo "✅ Added locale {{.LOCALE}}"
      - echo "📝 Edit {{.BUNDLE_DIR}}/catalog_{{.LOCALE}}.arb to add translations"

  lint:
    desc: Check localization completeness (fails if incomplete)
    summary: |
      Lints the source code for TIK usage and checks translation completeness.
      Fails if any translations are incomplete - use for CI/CD validation.
    dep: install
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - "{{.TOKI_CMD}} lint -require-complete -json -v"

  lint:stat:
    desc: Show translation status (no failure)
    summary: |
      Shows current translation status and completeness percentages.
      Never fails - use for development overview.
    dep: install
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - "{{.TOKI_CMD}} lint -json -v"

  webedit:
    desc: Open web-based translation editor
    summary: |
      Opens a browser-based UI for comfortable translation editing.
    dep: install
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - "{{.TOKI_CMD}} webedit"

  build:
    desc: Build example application
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - go build -o example .

  run:
    desc: Run example with specified locale
    dir: "{{.USER_WORKING_DIR}}"
    requires:
      vars: [LOCALE]
    cmds:
      - task: build
      - ./example -l {{.LOCALE}}

  run:de:
    desc: Run example in German
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - task: build
      - ./example -l de

  run:ru:
    desc: Run example in Russian
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - task: build
      - ./example -l ru

  locale:del:
    desc: Remove a translation locale
    summary: |
      Remove support for a language/locale.
      Deletes the .arb file for the specified locale.
    requires:
      vars: [LOCALE]
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - rm -f {{.BUNDLE_DIR}}/catalog_{{.LOCALE}}.arb
      - rm -f {{.BUNDLE_DIR}}/catalog_{{.LOCALE}}_gen.go
      - "{{.TOKI_CMD}} generate -l {{.DEFAULT_LOCALE}} -json"
      - echo "🗑️  Removed locale {{.LOCALE}}"

  clean:
    desc: Clean generated bundle files
    dep: install
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - rm -rf {{.BUNDLE_DIR}}/*
      - echo "🧹 Cleaned generated files"


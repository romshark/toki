# This configures Templier to run webedit on examples/simple
# for webedit development purposes.

proxy-timeout: 10s
format: true
lint: true
templier-host: "localhost:7331"

log:
  level: erronly
  clear-on:
  print-js-debug-logs: true

debounce: 50ms

tls:

app:
  dir-src-root: "./"
  exclude:
    - ".*" # All hidden files.
    - "*~" # Any temporary backup files IDEs might use.
    - internal/webedit/node_modules/*
  dir-cmd: "."
  dir-work: "."
  host: "http://localhost:52000"
  flags: webedit -m examples/simple -b tokibundle --dontopen

custom-watchers:
  - name: "Go mod update"
    cmd:
    include:
      - "go.mod"
      - "go.sum"
    exclude:
    debounce:
    fail-on-error: true
    requires: rebuild
  - name: "Bundle CSS"
    cmd: "make dist"
    include:
      - "internal/webedit/template/*.templ"
      - "internal/webedit/*.css"
      - "internal/webedit/tailwind.config.js"
      - "internal/webedit/postcss.config.js"
    exclude: ["internal/webedit/static/*"]
    fail-on-error: true
    debounce:
    requires: # No action, "Bundle Changed" will do the reloading.
  - name: Bundle Changed
    cmd: # Just reload all tabs.
    include: ["internal/webedit/static/*"]
    exclude:
    fail-on-error:
    debounce:
    requires: reload

compiler:
  gcflags:
  ldflags:
  asmflags:
  race:
  msan:
  tags:
  trimpath:
  p:
  env:
    CGO_ENABLED: 0
